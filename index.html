<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .links a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Project1</h1>
        <p>Welcome to your first repository!</p>
        <p style="font-size: 0.9rem; margin-top: 1rem; opacity: 0.7;">✨ Auto-deployment test - Updated on May 9, 2026</p>
        <span class="badge">Deployed on Vercel</span>
        <div class="links">
            <a href="https://github.com/geetis01/Project1">GitHub Repo</a>
            <a href="https://vercel.com">Vercel Dashboard</a>
        </div>
    </div>
</body>
</html>
